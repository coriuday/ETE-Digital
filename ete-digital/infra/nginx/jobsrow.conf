# jobsrow.com — nginx reverse proxy for PM2/systemd stack
# Install: sudo cp jobsrow.conf /etc/nginx/conf.d/jobsrow.conf && sudo nginx -t && sudo systemctl reload nginx
#
# Upstreams (must match your process manager):
#   Backend:  uvicorn/gunicorn on 127.0.0.1:8000
#   Frontend: serve dist on 127.0.0.1:3000  OR  nginx serves /frontend/dist directly
#
# IMPORTANT: Do NOT strip /api from the path — FastAPI routes are mounted at /api/*

upstream jobsrow_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

upstream jobsrow_frontend {
    server 127.0.0.1:3000;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name jobsrow.com www.jobsrow.com;

    # certbot will add HTTPS redirect after SSL is issued

    client_max_body_size 55m;

    # ── API + WebSocket (preserve /api prefix) ───────────────────────────────
    location /api/ {
        proxy_pass http://jobsrow_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── Health check ─────────────────────────────────────────────────────────
    location /health {
        proxy_pass http://jobsrow_backend/health;
        proxy_set_header Host $host;
    }

    # ── SPA (React) ──────────────────────────────────────────────────────────
    location / {
        proxy_pass http://jobsrow_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

