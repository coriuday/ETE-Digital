version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ete-postgres
    environment:
      POSTGRES_DB: ete_digital
      POSTGRES_USER: ete_user
      POSTGRES_PASSWORD: ete_dev_password_change_in_prod
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ete_user -d ete_digital" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ete-network

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: ete-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - ete-network

  # MinIO S3-compatible Object Storage
  minio:
    image: minio/minio:latest
    container_name: ete-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - ete-network

  # MailHog Email Testing
  mailhog:
    image: mailhog/mailhog:latest
    container_name: ete-mailhog
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI
    networks:
      - ete-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ete-backend
    environment:
      DATABASE_URL: postgresql://ete_user:ete_dev_password_change_in_prod@postgres:5432/ete_digital
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - ete-network

  # Vite Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: ete-frontend
    environment:
      VITE_API_URL: http://localhost:8000/api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host
    networks:
      - ete-network

volumes:
  postgres_data:
  redis_data:
  minio_data:


networks:
  ete-network:
    driver: bridge
