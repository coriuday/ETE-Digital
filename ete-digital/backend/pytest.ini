[pytest]
asyncio_mode = auto
# Lock the default loop scope for session-scoped async fixtures (pytest-asyncio ≥ 0.23)
asyncio_default_fixture_loop_scope = session
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = tests
addopts = --tb=short -q
log_cli_level = WARNING
pythonpath = .
