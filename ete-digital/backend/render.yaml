services:
  - type: web
    name: ete-digital-backend
    runtime: python
    rootDir: ete-digital/backend
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: "bash start.sh"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://ete-digital.com
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: REDIS_URL
        sync: false
