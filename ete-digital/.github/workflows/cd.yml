name: CD Pipeline

on:
  # Only deploy when CI passes on main
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [main]

# Prevent concurrent deploys to the same environment
concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Gate: only proceed if CI succeeded
  # ─────────────────────────────────────────────────────────────────────────────
  check-ci:
    name: Verify CI Passed
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: CI passed — proceeding to deployment
        run: echo "CI Pipeline passed for ${{ github.event.workflow_run.head_sha }}. Deploying..."

  # ─────────────────────────────────────────────────────────────────────────────
  # Deploy Backend → Render
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Render
    runs-on: ubuntu-latest
    needs: check-ci
    environment:
      name: production
      url: https://ete-digital-backend.onrender.com

    steps:
      - name: Trigger Render deploy
        run: |
          echo "Triggering Render deployment..."
          RESPONSE=$(curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_BACKEND_SERVICE_ID }}/deploys" \
            -d '{"clearCache": false}')
          echo "Deploy triggered: $RESPONSE"
          echo "deploy_id=$(echo $RESPONSE | python3 -c 'import sys,json; print(json.load(sys.stdin)["deploy"]["id"])')" >> $GITHUB_OUTPUT
        id: trigger

      - name: Wait for deployment to complete
        run: |
          echo "Waiting for Render deployment to complete..."
          for i in $(seq 1 30); do
            STATUS=$(curl -sf \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              "https://api.render.com/v1/services/${{ secrets.RENDER_BACKEND_SERVICE_ID }}/deploys/${{ steps.trigger.outputs.deploy_id }}" \
              | python3 -c 'import sys,json; print(json.load(sys.stdin)["deploy"]["status"])')
            echo "  Attempt $i/30 — status: $STATUS"
            if [ "$STATUS" = "live" ]; then
              echo "✅ Backend deployed successfully!"
              exit 0
            elif [ "$STATUS" = "failed" ] || [ "$STATUS" = "canceled" ]; then
              echo "❌ Backend deployment failed with status: $STATUS"
              exit 1
            fi
            sleep 10
          done
          echo "⏰ Timeout waiting for deployment"
          exit 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Deploy Frontend → Vercel
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    needs: check-ci
    environment:
      name: production
      url: https://ete-digital.vercel.app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        working-directory: ./frontend
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build for Vercel
        working-directory: ./frontend
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel production
        working-directory: ./frontend
        id: vercel_deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "✅ Deployed frontend to: $DEPLOY_URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Post-deploy Smoke Tests
  # ─────────────────────────────────────────────────────────────────────────────
  smoke-tests:
    name: Post-Deploy Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]

    steps:
      - name: Wait for services to stabilise
        run: sleep 15

      - name: Backend health check
        run: |
          echo "Checking backend health..."
          for i in $(seq 1 5); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://ete-digital-backend.onrender.com/health)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Backend /health returned 200"
              exit 0
            fi
            echo "  Attempt $i/5 — HTTP $HTTP_CODE. Retrying in 10s..."
            sleep 10
          done
          echo "❌ Backend health check failed after 5 attempts"
          exit 1

      - name: Frontend reachability check
        run: |
          echo "Checking frontend reachability..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://ete-digital.vercel.app)
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "301" ] || [ "$HTTP_CODE" = "302" ]; then
            echo "✅ Frontend returned HTTP $HTTP_CODE"
          else
            echo "❌ Frontend returned unexpected HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Summarise deployment
        if: always()
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | URL | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | https://ete-digital-backend.onrender.com | ✅ Live |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | https://ete-digital.vercel.app | ✅ Live |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.event.workflow_run.head_sha }}\`" >> $GITHUB_STEP_SUMMARY
