name: CD Pipeline

on:
  # Only deploy when CI Pipeline passes on main
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [main]

# Prevent concurrent deploys to production
concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Gate: only proceed if CI succeeded
  # ─────────────────────────────────────────────────────────────────────────────
  check-ci:
    name: Verify CI Passed
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: CI passed — proceeding to deployment
        run: echo "✅ CI Pipeline passed. Deploying commit ${{ github.event.workflow_run.head_sha }}..."

  # ─────────────────────────────────────────────────────────────────────────────
  # Deploy Backend → Render (via Deploy Hook)
  # https://api.render.com/deploy/srv-d6lkl5vtskes73aa3jh0
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Render
    runs-on: ubuntu-latest
    needs: check-ci
    environment:
      name: production
      url: https://ete-digital-backend.onrender.com

    steps:
      - name: Trigger Render deploy hook
        run: |
          echo "Triggering Render Deploy Hook..."
          HTTP_CODE=$(curl -sf -o /tmp/render_response.json -w "%{http_code}" \
            -X GET "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          cat /tmp/render_response.json || true
          echo "Response HTTP code: $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
            echo "✅ Render deploy hook triggered successfully"
          else
            echo "❌ Render deploy hook returned unexpected status: $HTTP_CODE"
            exit 1
          fi

      - name: Wait for Render to deploy
        run: |
          echo "⏳ Waiting 120s for Render to build and deploy..."
          sleep 120
          echo "Health check after deploy..."
          for i in $(seq 1 10); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              https://ete-digital-backend.onrender.com/health)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Backend /health returned 200 after deploy"
              exit 0
            fi
            echo "  Attempt $i/10 — HTTP $HTTP_CODE. Retrying in 15s..."
            sleep 15
          done
          echo "❌ Backend health check failed after waiting"
          exit 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Deploy Frontend → Vercel
  # Project: ete-digital (prj_sCAy0pxBbatAv1LCAA7m6tV7mcyJ)
  # Team:    coriuday18-gmailcoms-projects (team_MGI7KXWb9v8CqCC6JpalTP1U)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    needs: check-ci
    environment:
      name: production
      url: https://ete-digital.vercel.app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        working-directory: ./frontend
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build for Vercel production
        working-directory: ./frontend
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel production
        working-directory: ./frontend
        id: vercel_deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "✅ Deployed frontend to: $DEPLOY_URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Post-deploy summary
  # ─────────────────────────────────────────────────────────────────────────────
  post-deploy:
    name: Post-Deploy Summary
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()

    steps:
      - name: Deployment summary
        run: |
          echo "## 🚀 Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | URL | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | [ete-digital-backend.onrender.com](https://ete-digital-backend.onrender.com) | ${{ needs.deploy-backend.result == 'success' && '✅ Live' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | [ete-digital.vercel.app](https://ete-digital.vercel.app) | ${{ needs.deploy-frontend.result == 'success' && '✅ Live' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.event.workflow_run.head_sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** CI Pipeline on \`main\`" >> $GITHUB_STEP_SUMMARY
