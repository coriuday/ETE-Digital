name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs on the same branch to save minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Backend CI — Option A: Isolated local PostgreSQL (fast, always runs)
  # ─────────────────────────────────────────────────────────────────────────────
  backend-ci-local:
    name: Backend Tests (Local Postgres)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ete_digital_test
          POSTGRES_USER: ete_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8 (errors only)
        working-directory: ./backend
        run: flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Lint with flake8 (style)
        working-directory: ./backend
        run: flake8 app/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Type check with mypy
        working-directory: ./backend
        run: mypy app/ --ignore-missing-imports

      - name: Format check with black
        working-directory: ./backend
        run: black app/ --check

      - name: Run database migrations (local)
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://ete_user:test_password@localhost:5432/ete_digital_test
        run: alembic upgrade head

      - name: Run tests with coverage (local Postgres)
        working-directory: ./backend
        env:
          # Points to local Postgres container — never hits Supabase
          TEST_DATABASE_URL: postgresql://ete_user:test_password@localhost:5432/ete_digital_test
          DATABASE_URL: postgresql://ete_user:test_password@localhost:5432/ete_digital_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test-secret-key-for-ci-minimum-32-characters-long
          ENCRYPTION_KEY: test-encryption-key-for-ci-minimum-32-characters
          ENVIRONMENT: test
          DEBUG: "false"
          EMAIL_ENABLED: "false"
          MINIO_ENDPOINT: localhost
          MINIO_PORT: "9000"
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin123
          MINIO_SECURE: "false"
        run: |
          pytest tests/ --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage.xml
          flags: backend-local
          name: backend-local-coverage
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────────────────────
  # Backend CI — Option B: Supabase integration tests (runs when secret available)
  # ─────────────────────────────────────────────────────────────────────────────
  backend-ci-supabase:
    name: Backend Tests (Supabase Integration)
    runs-on: ubuntu-latest
    # Only run when the Supabase secret is available (skips on forks/PRs with no secret access)
    if: ${{ vars.SUPABASE_ENABLED == 'true' }}

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run integration tests against Supabase
        working-directory: ./backend
        env:
          # Points to real Supabase project — set TEST_DATABASE_URL in GitHub secrets
          TEST_DATABASE_URL: ${{ secrets.SUPABASE_TEST_DATABASE_URL }}
          DATABASE_URL: ${{ secrets.SUPABASE_TEST_DATABASE_URL }}
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          ENVIRONMENT: test
          DEBUG: "false"
          EMAIL_ENABLED: "false"
          MINIO_ENDPOINT: localhost
          MINIO_PORT: "9000"
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin123
          MINIO_SECURE: "false"
        run: |
          pytest tests/ --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage.xml
          flags: backend-supabase
          name: backend-supabase-coverage
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────────────────────
  # Frontend: Lint → Type Check → Test → Build
  # ─────────────────────────────────────────────────────────────────────────────
  frontend-ci:
    name: Frontend Tests & Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint with ESLint
        working-directory: ./frontend
        run: npm run lint

      - name: Type check with TypeScript
        working-directory: ./frontend
        run: npx tsc --noEmit

      - name: Run tests with coverage
        working-directory: ./frontend
        run: npm run test:coverage -- --reporter=verbose

      - name: Build application
        working-directory: ./frontend
        env:
          VITE_API_URL: https://ete-digital-backend.onrender.com
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ github.sha }}
          path: frontend/dist
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Security Scanning (Trivy — no token required)
  # ─────────────────────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'

      - name: Upload Trivy SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Snyk (Backend)
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=backend/requirements.txt

      - name: Run Snyk (Frontend)
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=frontend/package.json

  # ─────────────────────────────────────────────────────────────────────────────
  # Docker Build — only after CI jobs pass
  # ─────────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [backend-ci-local, frontend-ci]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: ete-digital-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: ete-digital-frontend:${{ github.sha }}
          build-args: |
            VITE_API_URL=https://ete-digital-backend.onrender.com
          cache-from: type=gha
          cache-to: type=gha,mode=max
