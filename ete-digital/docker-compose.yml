# ============================================================
# ETE Digital — Production Docker Compose
# ============================================================
# Usage:
#   Production:   docker compose up -d
#   Dev override: docker compose -f docker-compose.yml -f docker-compose.override.yml up
#
# Required env vars (copy backend/.env.example → backend/.env and fill in):
#   POSTGRES_PASSWORD, JWT_SECRET_KEY, ENCRYPTION_KEY,
#   MINIO_ACCESS_KEY, MINIO_SECRET_KEY
#
# VPS-specific env vars (set in .env for self-hosted deployment):
#   CADDY_DOMAIN   — your domain e.g. jobsrow.com (enables Caddy TLS termination)
#   DEPLOY_MODE    — set to 'vps' to enable gunicorn multi-worker mode
#   WORKERS        — number of gunicorn workers (default: auto from CPU count)
# ============================================================

name: ete-digital

services:

  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-ete_digital}
      POSTGRES_USER:     ${POSTGRES_USER:-ete_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ete_user} -d ${POSTGRES_DB:-ete_digital}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Expose only to internal network in production (no host port binding)
    # Override in docker-compose.override.yml to expose 5432 locally

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ─── MinIO (S3-compatible object storage) ────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      # ⚠️  CHANGE these before going live — never use defaults in production.
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY must be set}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY must be set}
    volumes:
      - minio_data:/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    # Console UI exposed to host; S3 API internal only
    ports:
      - "${MINIO_CONSOLE_PORT:-9001}:9001"

  # ─── MailHog (local SMTP dev server) ─────────────────────────────────────────
  # Uncomment in docker-compose.override.yml for local dev.
  # Not included here so production compose doesn't spin it up.

  # ─── Backend (FastAPI + Uvicorn / Gunicorn) ───────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # These override .env so container-to-container hostnames work
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ete_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-ete_digital}
      REDIS_URL:    redis://redis:6379/0
      MINIO_ENDPOINT: minio
      MINIO_PORT:     "9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY must be set}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY must be set}
      MINIO_SECURE: "false"
      # Email — uses MailHog in override; set production SMTP vars in .env
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      # VPS deployment mode: 'vps' → gunicorn multi-worker; 'render' → uvicorn single
      DEPLOY_MODE: ${DEPLOY_MODE:-render}
      WORKERS:     ${WORKERS:-}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      # Persist uploaded files across container restarts (resumes, avatars, etc.)
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - backend-net
      - frontend-net
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─── Frontend (React + Vite → nginx) ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - frontend-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── Caddy (Reverse Proxy + Automatic TLS) ────────────────────────────────────
  # Only activated on VPS. On Render/Vercel, skip by not using --profile vps.
  #
  # To enable on VPS:
  #   1. Set CADDY_DOMAIN=yourdomain.com in .env
  #   2. Point A/AAAA DNS records to your VPS IP
  #   3. docker compose --profile vps up -d
  #
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    profiles:
      - vps   # Only starts with: docker compose --profile vps up
    ports:
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - frontend-net
    depends_on:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:2019/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

# ─── Named volumes ────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  minio_data:
  uploads_data:   # Persistent storage for uploaded files (resumes, avatars)
  caddy_data:     # Caddy TLS certificates and state
  caddy_config:   # Caddy configuration cache

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  backend-net:
    driver: bridge
  frontend-net:
    driver: bridge
