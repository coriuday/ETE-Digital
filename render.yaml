services:
  - type: web
    name: ete-digital-backend
    runtime: python
    rootDir: ete-digital/backend
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: "bash start.sh"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: LOG_LEVEL
        value: INFO
      # Set these manually in Render dashboard:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      # Optional — set if you need Google OAuth:
      # - key: GOOGLE_CLIENT_ID
      #   sync: false
      # - key: GOOGLE_CLIENT_SECRET
      #   sync: false
      # Optional — set if you add email sending:
      # - key: SMTP_HOST
      #   sync: false
      # - key: SMTP_USER
      #   sync: false
      # - key: SMTP_PASSWORD
      #   sync: false
